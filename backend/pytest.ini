[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests
    models: Model tests
    services: Service tests
    routes: Route/API tests
    auth: Authentication tests
    slow: Slow running tests
